<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎸 Лента перебора | Школа Гитаристов</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Дополнительные стили для VK */
        .vk-header {
            display: none;
        }
        body {
            background: #0a0e17;
            margin: 0;
            padding: 0;
        }
        /* Адаптация под VK Mini App */
        .vk-miniapp-fix {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="vk-miniapp-fix">
    <div class="app">
        <div class="header">
            <h1>🎸 Лента перебора</h1>
            <p class="subtitle">Веди пальцем под ползунок</p>
        </div>

        <!-- Табулатура -->
        <div class="tab-section">
            <div class="tab-header">
                <span class="tab-name" id="tabName">—</span>
                <button class="btn-random" id="randomTabBtn">🎲 Случайный</button>
            </div>
            <div id="tabContainer"></div>
        </div>

        <!-- Ползунок -->
        <div class="slider-section">
            <div class="slider-header">
                <span>▶ Позиция</span>
                <span class="current-note" id="currentNote">—</span>
            </div>
            <input type="range" id="noteSlider" class="note-slider" min="0" max="0" value="0" step="1">
        </div>

        <!-- Скорость -->
        <div class="speed-section">
            <div class="speed-label">
                <span>⚡ Скорость движения</span>
                <span class="speed-value" id="speedValue">1x</span>
            </div>
            <div class="speed-controls">
                <button class="speed-btn" data-speed="0.5">🐢 0.5x</button>
                <button class="speed-btn active" data-speed="1">⏺ 1x</button>
                <button class="speed-btn" data-speed="1.5">⚡ 1.5x</button>
                <button class="speed-btn" data-speed="2">🚀 2x</button>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div class="controls-section">
            <button class="ctrl-btn" id="prevBtn">◀ Назад</button>
            <button class="ctrl-btn" id="playBtn">▶ Играть</button>
            <button class="ctrl-btn" id="nextBtn">Вперед ▶</button>
        </div>
    </div>

    <!-- VK Bridge - загружается первым и НЕ блокирует -->
    <script>
        // Самый ранний инициализатор VK
        window.vkBridgeReady = false;
        window.vkBridge = null;
        
        // Загружаем VK Bridge
        const script = document.createElement('script');
        script.src = 'https://vk.com/js/api/xd_that.js';
        script.onload = function() {
            if (window.XDThat) {
                window.vkBridge = window.XDThat;
                window.vkBridgeReady = true;
                console.log('✅ VK Bridge ready');
                // Отправляем инициализацию
                try {
                    window.vkBridge.send('VKWebAppInit', {}, function(data) {
                        console.log('VKWebAppInit response:', data);
                    });
                } catch(e) {
                    console.warn('VK Bridge send error:', e);
                }
            }
        };
        document.head.appendChild(script);
    </script>

    <!-- Наши скрипты -->
    <script src="js/tabs-db.js"></script>
    <script src="js/tabs-view.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
